name: security-audit

# Supply-chain audit of the Cargo dependency tree via cargo-deny: known RUSTSEC
# advisories, disallowed/duplicate crates, license policy, and source allow-listing
# (config in deny.toml). The weekly schedule catches newly-disclosed CVEs even when
# no code changes land.
#
# cargo-deny is a required status check, so the pull_request trigger runs
# unconditionally: a `paths`-filtered required check is skipped (never reported) on
# PRs that don't touch the dependency files, leaving the PR stuck on
# "Expected — Waiting for status to be reported". The push trigger keeps its paths
# filter since it only feeds the weekly/main signal, not a merge gate.
on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
      - ".github/workflows/security-audit.yml"
  pull_request:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC

permissions:
  contents: read

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check advisories bans licenses sources
