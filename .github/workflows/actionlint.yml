name: actionlint

# Lints the GitHub Actions workflow YAML itself (syntax, expression typos, shellcheck
# of inline run: scripts). On push to main it runs only when a workflow file or its
# config changes. On pull_request it runs unconditionally: actionlint is a required
# status check, and a `paths`-filtered required check is skipped (never reported) on
# PRs that don't touch workflows, which leaves the PR stuck on
# "Expected — Waiting for status to be reported". actionlint is fast, so always run it.
on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - ".github/actionlint.yaml"
  pull_request:

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12
        with:
          fail-on-error: true
