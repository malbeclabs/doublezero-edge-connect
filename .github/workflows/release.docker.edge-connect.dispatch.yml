name: release.docker.edge-connect.dispatch

# Event-driven counterpart to release.docker.edge-connect.poll.yml. When the
# upstream malbeclabs/doublezero repo (re)publishes a doublezero base image after
# a release, it fires a repository_dispatch here so the matching edge-connect
# variant rebuilds within a minute instead of waiting for the daily poll. The
# poll stays in place as a safety net if a dispatch is ever missed.
#
# Payload (client_payload):
#   env:     testnet | mainnet-beta | devnet  (which base moved)
#   version: doublezero release version (informational; not tagged here — a base
#            move is not an edge-connect release, so we publish moving + :sha- tags
#            only, matching the poll)
on:
  repository_dispatch:
    types: [doublezero-base-published]

# Least-privilege default; the rebuild job (via the reusable builder) inherits the
# packages:write it grants below.
permissions:
  contents: read

jobs:
  # Validate/normalize the payload env before spending a build. repository_dispatch
  # is authenticated (only the cross-repo token can trigger it), but we still refuse
  # anything that isn't one of the three known variants.
  validate:
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.v.outputs.env }}
      ok: ${{ steps.v.outputs.ok }}
    steps:
      - id: v
        shell: bash
        # Pass the untrusted client_payload through env vars, never inline ${{ }}
        # into the script — inline interpolation lets a crafted payload break out
        # of the shell quoting (defense-in-depth; the dispatch is authenticated).
        env:
          PAYLOAD_ENV: ${{ github.event.client_payload.env }}
          PAYLOAD_VERSION: ${{ github.event.client_payload.version }}
        run: |
          case "$PAYLOAD_ENV" in
            testnet|mainnet-beta|devnet)
              echo "env=$PAYLOAD_ENV" >> "$GITHUB_OUTPUT"
              echo "ok=true" >> "$GITHUB_OUTPUT"
              echo "Rebuilding edge-connect variant: $PAYLOAD_ENV (doublezero '$PAYLOAD_VERSION')" ;;
            *)
              echo "ok=false" >> "$GITHUB_OUTPUT"
              echo "::warning::ignoring dispatch with unknown env '$PAYLOAD_ENV'" ;;
          esac

  # Rebuild only the affected variant: moving tags + :sha- (no version), exactly
  # like the poll's rebuild — a base move is not an edge-connect release.
  rebuild:
    needs: validate
    if: needs.validate.outputs.ok == 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/release.docker.edge-connect.build.yml
    with:
      env: ${{ needs.validate.outputs.env }}
      push: true
      ref: ${{ github.ref_name }}
