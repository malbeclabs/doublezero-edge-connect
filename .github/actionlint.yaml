# actionlint config. Most workflows run on the default GitHub-hosted ubuntu-latest
# runner; qa.connect.yml runs the live install-and-connect QA on a dedicated
# self-hosted runner, so its custom label is declared here (built-in labels like
# self-hosted/linux/x64 are known to actionlint and need no declaration).
self-hosted-runner:
  labels:
    - edge-connect-qa
