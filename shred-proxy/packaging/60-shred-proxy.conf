# Kernel tuning for shred-proxy (installed to /etc/sysctl.d/60-shred-proxy.conf).
#
# shred-proxy receives shreds at line rate; a large per-socket receive buffer absorbs bursts and
# reduces drops. The service asks for SO_RCVBUF via --recv-buf / DZ_RECV_BUF (default 8 MiB), but
# the kernel silently caps that request at net.core.rmem_max. Raise the cap so the request is
# honored. If you increase DZ_RECV_BUF, raise this to match.
net.core.rmem_max = 8388608
