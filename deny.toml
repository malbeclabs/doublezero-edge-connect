# cargo-deny policy, enforced by .github/workflows/security-audit.yml.
# Run locally with: cargo install cargo-deny && cargo deny check

[advisories]
# Fail on any RUSTSEC advisory and on crates pulled from a yanked version.
yanked = "deny"

[licenses]
# Permissive licenses only — matches this crate's Apache-2.0 license. Unlisted
# licenses fail the check; add to this list (or [licenses.exceptions]) deliberately.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    # webpki-roots bundles Mozilla's root certificate dataset under the Community
    # Data License Agreement (Permissive 2.0); pulled in transitively via reqwest.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
# Allowing a permissive license that no current dependency uses is intentional
# headroom for future deps — don't warn about it.
unused-allowed-license = "allow"

[bans]
# Surface accidental duplicate versions of the same crate, but don't fail the build
# on them (common and usually benign in a transitive tree).
multiple-versions = "warn"

[sources]
# Only crates.io is allowed as a registry source; no git or unknown registries.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
